[project]
name = "pubg-dashboard"
version = "0.1.0"
description = "Self-hosted PUBG match archive, stats, heatmaps and telemetry replay"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.139.2",
    "uvicorn[standard]>=0.38.0",
    "sqlalchemy[asyncio]>=2.0.51",
    "asyncpg>=0.31.0",
    "alembic>=1.18.5",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.2",
    "httpx>=0.28.1,<1.0.0",
    "tenacity>=9.1.4",
    "structlog>=26.1.0",
    "typer>=0.27.0",
    # orjson parses the 19 MB telemetry payloads several times faster than the
    # stdlib json module; at ~35k events per match that difference is the
    # difference between a 2s and a 12s parse.
    "orjson>=3.11.9",
    # Processed replay bundles are served as MessagePack — roughly half the
    # bytes of JSON for the numeric-heavy frame index.
    "msgpack>=1.1.0",
    "boto3>=1.40.0",
]

[project.scripts]
pubgd = "pubg_dashboard.cli:app"

[dependency-groups]
dev = [
    "pytest>=8.4",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.15.22",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pubg_dashboard"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic writes `op.create_table(...)` one column per line and blows the line
# limit on any table with long names. Reformatting generated migrations only
# creates diff noise the next time one is autogenerated.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "B008",  # FastAPI's Depends() in defaults is the documented idiom
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
