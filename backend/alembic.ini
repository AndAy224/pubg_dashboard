# Alembic configuration.
#
# Run every alembic command from `backend/` (this file's directory):
#     uv run -- alembic upgrade head
#     uv run -- alembic revision --rev-id 0002 -m "add foo"
#
# `sqlalchemy.url` is deliberately EMPTY here. env.py overwrites it from
# Settings.database_url so migrations and the running app can never drift onto
# two different databases, and so the DSN (which contains a password) is never
# committed.

[alembic]
script_location = alembic

# Makes `import pubg_dashboard` work without an editable install, because
# alembic is invoked from this directory.
prepend_sys_path = .

# Revision ids are assigned by hand (`--rev-id 0002`) so the files sort in
# apply order on disk instead of by random uuid slug.
file_template = %%(rev)s_%%(slug)s

# 1.16+ name for the old `version_path_separator`; without it alembic warns.
path_separator = os

# Timestamps written into new revision files are UTC, matching every
# timestamptz in the schema.
timezone = UTC

sqlalchemy.url =


# --------------------------------------------------------------------------
# Logging
# --------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
